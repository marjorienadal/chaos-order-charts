  activeFilter = cat;

function fmtDate(d) {
  if (!d) return '';
  const p = d.split('-');
  const m = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return m[parseInt(p[1])-1] + ' ' + p[0];
}

function render() {
  const q = document.getElementById('srch').value.toLowerCase();
  let data = DATA.filter(p => {
    if (activeFilter !== 'all' && p.category !== activeFilter) return false;

    <div class="stat"><div class="stat-label">Corroborations</div><div class="stat-value">${totalCorr}</div></div>
    <div class="stat"><div class="stat-label">Avg lead time</div><div class="stat-value">${avgDays}d</div></div>
    <div class="stat"><div class="stat-label">Longest lead</div><div class="stat-value">${maxDays}d</div></div>
  `;

  const cats = [...new Set(data.map(p=>p.category))].sort();
  document.getElementById('legend').innerHTML = cats.map(c=>`
    <span class="leg-item"><span class="leg-dot" style="background:${CAT[c]||'#888'}"></span>${c}</span>
  `).join('');

  const grid = document.getElementById('grid');
  if (!data.length) { grid.innerHTML = '<div class="empty">No matching publications</div>'; return; }

  grid.innerHTML = data.map(p => {
    const pct = Math.min(100, (p.best_days / MAX_DAYS) * 100);
    const col = CAT[p.category] || '#888';
    const isExp = expanded.has(p.title);
    const dayLabel = p.best_days > 0 ? p.best_days + 'd' : 'same day';
    const isTrade = p.all_corr.some(c => c.status && c.status.includes('TRADING'));
    const badge = isTrade ? '<span class="badge-trading">trading</span>' : '';
    const key = p.title.replace(/[^a-z0-9]/gi,'').substring(0,20);

    return `
      <div class="row ${isExp?'expanded':''}" onclick="toggle(${JSON.stringify(p.title)})">
        <div>
          <div class="row-title">
            <span class="cat-dot" style="background:${col}"></span>
            ${p.short}${badge}
          </div>
          <div class="row-date">${fmtDate(p.pub_date)}</div>
        </div>
        <div>
          <div class="bar-wrap"><div class="bar-fill" style="width:${pct}%;background:${col};opacity:0.6"></div></div>
          <div class="bar-label">${p.best_corr.substring(0,72)}${p.best_corr.length>72?'…':''}</div>
        </div>
        <div class="days-badge" style="color:${col}">${dayLabel}</div>
        <div class="count-badge">${p.corr_count}</div>
      </div>
      <div class="detail ${isExp?'open':''}" id="d${key}">
        ${p.all_corr.map(c=>`
          <div class="corr-item">
            <div class="corr-event">${c.event}</div>
            <div class="corr-meta">
              <span>${fmtDate(c.date)}</span>
              <span>${c.source}</span>
              <span style="color:${col}">${c.days}d lead</span>
              <span style="color:#2d7a3a">${c.status}</span>
            </div>
          </div>
        `).join('')}
      </div>
    `;
  }).join('');
}

function toggle(title) {
  if (expanded.has(title)) expanded.delete(title); else expanded.add(title);
  render();
}

render();
</script>
</body>
</html>
